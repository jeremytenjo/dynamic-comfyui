name: Publish Docker Image (Manual)

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Docker tag to publish (example: v1.0.3)"
        required: true
        type: string
      push_latest:
        description: "Also push :latest"
        required: true
        type: boolean
        default: false
      image_name:
        description: "Docker image name"
        required: true
        type: string
        default: body-gen-comfyui

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check compatibility policy
        run: python3 scripts/check-compatibility.py

      - name: Validate dependency resolution (dry-run)
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          grep -Ev '(^-e[[:space:]]+git\+|[[:space:]]@ git\+|^torch$|^torchaudio$|^torchvision$|^triton$)' requirements.txt > /tmp/requirements.ci.txt
          pip install --dry-run -r /tmp/requirements.ci.txt

      - name: Validate core Jupyter stack
        run: |
          python3 -m venv .venv-core
          source .venv-core/bin/activate
          python -m pip install --upgrade pip
          jupyterlab_ver="$(awk -F== '/^jupyterlab==/{print $2}' requirements.txt)"
          notebook_ver="$(awk -F== '/^notebook==/{print $2}' requirements.txt)"
          pyparsing_ver="$(awk -F== '/^pyparsing==/{print $2}' requirements.txt)"
          pip install "jupyterlab==${jupyterlab_ver}" "notebook==${notebook_ver}" "pyparsing==${pyparsing_ver}"
          pip check

  build-and-push:
    needs: dependency-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free disk space on runner
        run: |
          df -h
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf /usr/local/graalvm || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push version tag
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:${{ inputs.version_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push latest tag without rebuild
        if: ${{ inputs.push_latest }}
        run: |
          docker buildx imagetools create \
            -t "${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:latest" \
            "${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:${{ inputs.version_tag }}"
