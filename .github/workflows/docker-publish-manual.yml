name: Publish Docker Image (Manual)

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Docker tag to publish (example: v1.0.3)"
        required: true
        type: string
      push_latest:
        description: "Also push :latest"
        required: true
        type: boolean
        default: false
      image_name:
        description: "Docker image name"
        required: true
        type: string
        default: body-gen-comfyui

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push version tag
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:${{ inputs.version_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Push latest tag without rebuild
        if: ${{ inputs.push_latest }}
        run: |
          docker buildx imagetools create \
            -t "${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:latest" \
            "${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:${{ inputs.version_tag }}"
